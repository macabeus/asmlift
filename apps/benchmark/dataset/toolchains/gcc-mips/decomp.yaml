# The decomp.yaml for N64/KMC GCC — a working example of a `compiler` command whose compiler
# cannot run natively: KMC GCC is a Linux/i386 binary, so the command wraps it in a one-shot
# `docker run`. The candidate's directory is mounted at /work and the file names are rebased
# into the container with $(dirname)/$(basename) — copy this shape for any dockerized compiler.
#
# {{inputPath}} is the candidate .c file, {{outputPath}} is the object it must produce. Flags
# mirror the Snowboard Kids 2 decomp Makefile.
#
# To use this in your project, replace:
#   $ASMLIFT_DOCKER    → docker
#   $ASMLIFT_KMC_DIR   → the directory holding the KMC gcc binaries (e.g. tools/gcc_kmc)
#   $ASMLIFT_KMC_IMAGE → i386/ubuntu:bionic (any linux/386 image with libc works)
# (The variables exist only to keep machine paths out of this repo — the benchmark fills
# them in when it runs.)
#
# (The benchmark's own scoring skips this command and reuses a pooled long-lived container;
# the reproduction scripts run it as written.)
name: asmlift benchmark (gcc-mips)
platform: n64
tools:
  asmlift:
    target: gcc-mips
    compiler: >-
      "$ASMLIFT_DOCKER" run --rm --platform linux/386
      -v "$ASMLIFT_KMC_DIR":/kmc:ro -v "$(dirname {{inputPath}})":/work -e COMPILER_PATH=/kmc
      "$ASMLIFT_KMC_IMAGE"
      /kmc/gcc -mabi=32 -mgp32 -mfp32 -mno-abicalls -nostdinc -fno-PIC -G 0 -funsigned-char
      -w -mips3 -EB -O2 -fno-builtin -fno-asm
      -c -o "/work/$(basename {{outputPath}})" "/work/$(basename {{inputPath}})"
